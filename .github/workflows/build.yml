name: Build VoiceInk
on:
  push:
jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Set up Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version
      - name: Install dependencies
        run: |
          brew update
          brew install cmake
      - name: Build whisper framework correctly
        run: |
          # Use absolute path — the Xcode project hardcodes /Users/runner/VoiceInk-Dependencies/
          mkdir -p /Users/runner/VoiceInk-Dependencies
          git clone https://github.com/ggerganov/whisper.cpp.git /Users/runner/VoiceInk-Dependencies/whisper.cpp
          cd /Users/runner/VoiceInk-Dependencies/whisper.cpp
          # Build the XCFramework
          ./build-xcframework.sh
      - name: Build VoiceInk
        run: |
          xcodebuild -project VoiceInk.xcodeproj -scheme VoiceInk -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='SWIFT_PACKAGE Xcode' \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            -derivedDataPath build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInk-macos14.0
          path: build/Build/Products/Release/VoiceInk.app